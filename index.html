<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容选题助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group .hint {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 20px;
        }

        .result.active {
            display: block;
        }

        .result-content {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            line-height: 1.8;
        }

        .result-content h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-content h4 {
            color: #333;
            margin: 15px 0 10px;
        }

        .result-content strong {
            color: #764ba2;
        }

        .config-summary {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .config-summary p {
            margin: 5px 0;
        }

        .config-summary strong {
            color: #667eea;
        }

        .topic-input {
            font-size: 16px;
        }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .quick-prompt {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quick-prompt:hover {
            background: #e0e0e0;
        }

        .api-key-section {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .api-key-section p {
            font-size: 14px;
            color: #856404;
            margin-bottom: 10px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 内容选题助手</h1>
            <p>基于"选题四象限"方法论，为知识型IP生成高质量内容选题</p>
        </div>

        <!-- 配置页面 -->
        <div class="card page" id="configPage">
            <h2 style="margin-bottom: 20px;">📝 首次使用：配置你的信息</h2>

            <div class="form-group">
                <label>你是谁？你的专业领域是什么？</label>
                <textarea id="identity" placeholder="例如：我是一名英语提分老师，主要帮助在职人员快速提升英语成绩..."></textarea>
            </div>

            <div class="form-group">
                <label>你的目标人群是谁？</label>
                <textarea id="audience" placeholder="请详细描述：年龄、职业、身份标签、他们面临什么问题...&#10;例如：35岁左右的职场女性，想在工作中提升英语，但平时工作忙、没时间学习，之前报过很多课都半途而废..."></textarea>
            </div>

            <div class="form-group">
                <label>你提供什么产品/服务？</label>
                <textarea id="product" placeholder="例如：30天英语提分课程，针对在职人员设计，每天20分钟，帮助学员从英语小白到能看懂工作相关的英文资料..."></textarea>
            </div>

            <div class="form-group">
                <label>当前阶段</label>
                <select id="stage">
                    <option value="起步期">起步期（0-1万粉丝，快速涨粉）</option>
                    <option value="成长期">成长期（1-10万粉丝，建立信任）</option>
                    <option value="成熟期">成熟期（10万+粉丝，转化变现）</option>
                </select>
            </div>

            <div class="form-group">
                <label>选题目标</label>
                <select id="goal">
                    <option value="涨粉流量">涨粉流量（扩大影响力）</option>
                    <option value="建立信任">建立信任（深度连接粉丝）</option>
                    <option value="直接转化">直接转化（推广产品/服务）</option>
                </select>
            </div>

            <button class="btn" onclick="saveConfig()">保存配置，开始使用</button>
        </div>

        <!-- 选题生成页面 -->
        <div class="card page" id="generatePage">
            <h2 style="margin-bottom: 20px;">💡 选题生成器</h2>

            <div class="config-summary" id="configSummary"></div>

            <div class="form-group">
                <label>输入你的灵感、想法、热点或任何内容素材...</label>
                <textarea id="topicInput" class="topic-input" placeholder="例如：&#10;- 今天看到35岁女性职场焦虑的热点&#10;- 很多学员问我，工作忙怎么坚持学英语&#10;- 想做一个关于"早起学习"的内容&#10;- 任何一句话、一个想法都可以..."></textarea>
                <div class="quick-prompts">
                    <button class="quick-prompt" onclick="setQuickPrompt('热点话题')">🔥 热点话题</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('学员常见问题')">❓ 学员问题</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('个人经历/故事')">📖 个人故事</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('专业知识/干货')">📚 专业干货</button>
                </div>
            </div>

            <button class="btn" onclick="generateTopics()">生成选题</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在分析并生成选题...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <h3>📌 选题建议</h3>
                <div class="result-content" id="resultContent"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="showConfigPage()">⚙️ 更新配置</button>
            </div>
        </div>
    </div>

    <script>
        // 内置API Key（智谱AI）
        const ZHIPU_API_KEY = '59e07b20a42f42818e4251635ea23419.RcQ0FD0Jngw9bD4X';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkConfig();
        });

        // 检查配置
        function checkConfig() {
            const config = localStorage.getItem('topic_config');
            if (config) {
                showGeneratePage();
            } else {
                showConfigPage();
            }
        }

        // 显示配置页面
        function showConfigPage() {
            document.getElementById('configPage').classList.add('active');
            document.getElementById('generatePage').classList.remove('active');

            // 加载已有配置
            const config = JSON.parse(localStorage.getItem('topic_config') || '{}');
            if (config.identity) document.getElementById('identity').value = config.identity;
            if (config.audience) document.getElementById('audience').value = config.audience;
            if (config.product) document.getElementById('product').value = config.product;
            if (config.stage) document.getElementById('stage').value = config.stage;
            if (config.goal) document.getElementById('goal').value = config.goal;
        }

        // 显示生成页面
        function showGeneratePage() {
            document.getElementById('configPage').classList.remove('active');
            document.getElementById('generatePage').classList.add('active');

            // 显示配置摘要
            const config = JSON.parse(localStorage.getItem('topic_config') || '{}');
            document.getElementById('configSummary').innerHTML = `
                <p><strong>身份：</strong>${config.identity || '未设置'}</p>
                <p><strong>目标人群：</strong>${config.audience || '未设置'}</p>
                <p><strong>产品/服务：</strong>${config.product || '未设置'}</p>
                <p><strong>阶段：</strong>${config.stage || '未设置'}</p>
                <p><strong>目标：</strong>${config.goal || '未设置'}</p>
            `;
        }

        // 保存配置
        function saveConfig() {
            const config = {
                identity: document.getElementById('identity').value.trim(),
                audience: document.getElementById('audience').value.trim(),
                product: document.getElementById('product').value.trim(),
                stage: document.getElementById('stage').value,
                goal: document.getElementById('goal').value
            };

            if (!config.identity || !config.audience || !config.product) {
                alert('请完整填写前三个问题');
                return;
            }

            localStorage.setItem('topic_config', JSON.stringify(config));
            showGeneratePage();
        }

        // 设置快捷提示
        function setQuickPrompt(type) {
            const input = document.getElementById('topicInput');
            switch(type) {
                case '热点话题':
                    input.value = '最近看到关于[热点话题]的讨论，想结合这个做个内容...';
                    break;
                case '学员常见问题':
                    input.value = '很多学员问我：[具体问题]...';
                    break;
                case '个人经历/故事':
                    input.value = '想分享我的一个经历：[具体故事]...';
                    break;
                case '专业知识/干货':
                    input.value = '想讲一个专业知识点：[具体内容]...';
                    break;
            }
            input.focus();
        }

        // 生成选题
        async function generateTopics() {
            const input = document.getElementById('topicInput').value.trim();
            const config = JSON.parse(localStorage.getItem('topic_config') || '{}');

            if (!input) {
                showError('请输入你的灵感、想法或素材');
                return;
            }

            // 显示加载状态
            document.getElementById('loading').classList.add('active');
            document.getElementById('result').classList.remove('active');
            document.getElementById('error').classList.remove('active');

            // 构建提示词
            const prompt = `请基于以下信息，为用户生成内容选题：

【用户定位信息】
- 身份/专业：${config.identity}
- 目标人群：${config.audience}
- 产品/服务：${config.product}
- 当前阶段：${config.stage}
- 选题目标：${config.goal}

【用户输入的素材】
${input}

请按照选题四象限方法论，分析这个素材适合哪些象限，并为每个象限生成1-2条高质量选题。

输出格式：
## 📌 选题建议

### 选题1：[标题]
**象限**：[哪个象限]
**人群**：[具体人群描述]
**场景/痛点**：[真实场景还原]
**价值点**：[这条选题解决什么问题]
**产品连接**：[如何与用户的产品/服务建立连接]

---`;

            try {
                const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ZHIPU_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'glm-4-flash',
                        messages: [{
                            role: 'user',
                            content: prompt
                        }]
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || '请求失败');
                }

                const data = await response.json();
                const result = data.choices[0].message.content;

                // 显示结果
                document.getElementById('resultContent').innerHTML = formatResult(result);
                document.getElementById('result').classList.add('active');

            } catch (error) {
                showError('生成失败：' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        // 格式化结果
        function formatResult(text) {
            // 简单的Markdown转HTML
            return text
                .replace(/### (.*)/g, '<h4>$1</h4>')
                .replace(/## (.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/---/g, '<hr>')
                .replace(/\n/g, '<br>');
        }

        // 显示错误
        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').classList.add('active');
        }
    </script>
</body>
</html>
