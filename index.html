<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 选题助手 v3.1 - 融合6大选题理论</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header .version {
            font-size: 0.8em;
            opacity: 0.8;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .header p {
            opacity: 0.9;
            margin-top: 10px;
        }

        .header-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .card-title {
            font-size: 1.4em;
            margin-bottom: 20px;
            color: #333;
        }

        .method-cards {
            display: grid;
            gap: 15px;
        }

        .method-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .method-card:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .method-card h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: #333;
            font-size: 1.1em;
        }

        .method-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .method-card .method-suitable {
            font-size: 12px;
            color: #888;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea.input-field {
            min-height: 100px;
            resize: vertical;
        }

        .hint-text {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .example-text {
            background: #fff8e1;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .radio-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .radio-item input[type="radio"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
        }

        .radio-item div {
            flex: 1;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: background 0.3s;
        }

        .step-dot.active {
            background: #667eea;
        }

        .hidden {
            display: none !important;
        }

        .positioning-summary {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .positioning-summary h4 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .positioning-item {
            display: flex;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .positioning-label {
            font-weight: 500;
            color: #555;
            min-width: 60px;
        }

        .positioning-value {
            color: #333;
            flex: 1;
        }

        .analysis-section {
            margin-top: 15px;
        }

        .analysis-card {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .analysis-card h5 {
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .analysis-card p {
            color: #666;
            font-size: 13px;
            line-height: 1.7;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            background: #667eea;
            color: white;
            border-radius: 12px;
            font-size: 11px;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .preference-options {
            margin-top: 12px;
        }

        .preference-group {
            background: #fafafa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .preference-group h5 {
            margin-bottom: 8px;
            color: #555;
            font-size: 13px;
        }

        .preference-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .preference-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }

        .loading {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 20px;
        }

        .result.active {
            display: block;
        }

        .result-content {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            line-height: 1.8;
        }

        .result-content h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-content h4 {
            color: #333;
            margin: 15px 0 10px;
            font-size: 16px;
        }

        .result-content strong {
            color: #764ba2;
        }

        .result-content p,
        .result-content li {
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-prompt {
            background: #f0f0f0;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quick-prompt:hover {
            background: #e0e0e0;
        }

        .quick-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
        }

        .quick-option {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .quick-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .quick-option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .benchmark-input {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .benchmark-input h4 {
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        .chat-container {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .chat-message {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .chat-message.bot {
            border-left: 4px solid #667eea;
        }

        .chat-message.user {
            border-left: 4px solid #4caf50;
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            margin-right: 8px;
        }

        .question-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .question-hint {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .diagnosis-report {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
        }

        .diagnosis-report h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .diagnosis-report h4 {
            color: #333;
            margin: 12px 0 8px;
            font-size: 14px;
        }

        .diagnosis-report p,
        .diagnosis-report li {
            font-size: 13px;
            line-height: 1.7;
            color: #555;
        }

        .diagnosis-report ul {
            padding-left: 18px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .select-field {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            background: white;
            cursor: pointer;
        }

        .select-field:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 选题助手</h1>
            <span class="version">v3.1</span>
            <p>融合6大选题理论 | 三种定位入口 | 智能生成选题</p>
            <div class="header-actions">
                <button class="header-btn" onclick="showHistory()">📋 历史</button>
                <button class="header-btn" onclick="resetPositioning()">🔄 重新定位</button>
            </div>
        </div>

        <!-- 页面1：选择定位方式 -->
        <div class="card page active" id="methodSelection">
            <div class="card-title">🎯 选择你的定位方式</div>
            <div class="method-cards">
                <div class="method-card" onclick="startMethod('full')">
                    <h3>📝 方式一：完整诊断</h3>
                    <p>通过11个问题，全面梳理你的定位信息</p>
                    <p class="method-suitable">适合：对定位有清晰认知，想系统规划</p>
                </div>
                <div class="method-card" onclick="startMethod('benchmark')">
                    <h3>🔍 方式二：对标分析</h3>
                    <p>找对标账号，系统分析并推导适合你的定位</p>
                    <p class="method-suitable">适合：不清楚定位，但有参考对象</p>
                </div>
                <div class="method-card" onclick="startMethod('quick')">
                    <h3>🚀 方式三：快速启动</h3>
                    <p>只需3个核心问题，快速开始生成选题</p>
                    <p class="method-suitable">适合：刚开始，想先试试看</p>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="loadSavedConfig()">📂 加载已保存的配置</button>
            </div>
        </div>

        <!-- 页面2：完整诊断 -->
        <div class="card page" id="fullDiagnosis">
            <div class="card-title">📋 完整定位诊断</div>
            <div class="chat-container" id="fullDiagnosisChat"></div>
            <div class="input-group">
                <textarea id="fullDiagnosisInput" class="input-field" placeholder="输入你的回答..." style="min-height: 80px;"></textarea>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="submitFullDiagnosisAnswer()">提交</button>
                <button class="btn btn-secondary" onclick="showPage('methodSelection')">返回</button>
            </div>
        </div>

        <!-- 页面3：对标分析 -->
        <div class="card page" id="benchmarkAnalysis">
            <div class="card-title">🔍 对标分析定位</div>
            <div id="benchmarkContent"></div>
        </div>

        <!-- 页面4：快速启动 -->
        <div class="card page" id="quickStart">
            <div class="card-title">🚀 快速启动</div>
            <div id="quickContent"></div>
        </div>

        <!-- 页面5：诊断报告 -->
        <div class="card page" id="reportPage">
            <div class="card-title">📊 定位诊断报告</div>
            <div id="diagnosisReport"></div>
            <div class="btn-group">
                <button class="btn" onclick="confirmDiagnosis()">确认，开始生成选题</button>
                <button class="btn btn-secondary" onclick="restartDiagnosis()">重新诊断</button>
            </div>
        </div>

        <!-- 页面6：选题生成 -->
        <div class="card page" id="generatePage">
            <div class="positioning-summary">
                <h4>📍 当前定位</h4>
                <div id="currentPositioning"></div>
            </div>

            <div class="input-group">
                <label class="input-label">输入你的灵感、想法、热点或任何内容素材</label>
                <textarea id="topicInput" class="input-field" placeholder="例如：&#10;- 今天看到职场焦虑的热点讨论&#10;- 很多学员问我，工作忙怎么坚持学习&#10;- 想做一个关于早起习惯的内容&#10;- 任何一句话、一个想法都可以..."></textarea>
                <div class="quick-prompts">
                    <button class="quick-prompt" onclick="setQuickPrompt('热点')">🔥 热点话题</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('问题')">❓ 学员问题</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('故事')">📖 个人故事</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('干货')">📚 专业干货</button>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn" onclick="generateTopics()">🎯 生成选题</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在基于你的定位生成选题...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <h3 style="color: #667eea; margin-bottom: 15px;">📌 选题建议</h3>
                <div class="result-content" id="resultContent"></div>
                <div style="margin-top: 20px; text-align: center;">
                    <button class="btn btn-secondary" onclick="generateMoreTopics()">🔄 继续生成更多选题</button>
                </div>
            </div>

            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-secondary btn-small" onclick="showPage('methodSelection')">🏠 返回首页</button>
            </div>
        </div>
    </div>

    <script>
        // 内置API Key（智谱AI）
        const ZHIPU_API_KEY = '59e07b20a42f42818e4251635ea23419.RcQ0FD0Jngw9bD4X';

        // 全局状态
        let appState = {
            positioning: null,
            method: null,
            topics: [],
            history: []
        };

        // 选题生成相关状态
        let currentTopicInput = '';
        let generatedTopicCount = 0;

        // ==================== 完整诊断问题 ====================
        const fullDiagnosisQuestions = [
            {
                id: 'profession',
                question: '你的职业/专业身份是什么？',
                hint: '例如：律师、心理咨询师、健身教练、英语老师...',
                placeholder: '输入你的职业/专业身份...'
            },
            {
                id: 'background',
                question: '你有什么独特的背景/故事/经历？',
                hint: '这会是你做内容的"信任背书"和"差异化来源"。\n\n例如：从180斤减到110斤、从农村考上清华、10年大厂经验转行做自媒体...',
                placeholder: '描述你的独特背景...'
            },
            {
                id: 'differentiation',
                question: '你和同行最大的不同是什么？',
                hint: '思考：别人做内容，你凭什么被记住？\n\n例如：别人讲理论，我讲实操；别人讲成功案例，我讲失败教训；别人很严肃，我很幽默...',
                placeholder: '描述你的差异化...'
            },
            {
                id: 'audience',
                question: '你的用户具体是谁？（越详细越好）',
                hint: '请包含：年龄、职业、身份标签、核心困扰。\n\n示例好回答：\n"35岁左右的职场女性，在互联网公司工作，想提升英语但工作忙、没时间学习，之前报过很多课都因为坚持不下来而放弃"',
                placeholder: '描述你的目标人群...'
            },
            {
                id: 'product',
                question: '你的核心产品/服务是什么？',
                hint: '例如：30天英语提分课程、职场咨询、减肥训练营...',
                placeholder: '输入你的产品/服务...'
            },
            {
                id: 'productValue',
                question: '它解决了用户的什么问题？有什么独特之处？',
                hint: '思考：用户为什么要选择你而不是别人？\n\n例如：每天只需20分钟，碎片时间也能学；针对职场场景设计，学了就能用...',
                placeholder: '描述你的产品价值...'
            },
            {
                id: 'stage',
                question: '你的IP目前处于哪个阶段？',
                hint: '请选择一个最符合的选项：\n\nA. 起步期（0-1万粉丝）：目标是快速涨粉，扩大知名度\nB. 成长期（1-10万粉丝）：目标是建立信任，深度连接粉丝\nC. 成熟期（10万+粉丝）：目标是转化变现，商业闭环',
                placeholder: '输入 A、B 或 C',
                isChoice: true,
                choices: {
                    'A': '起步期（0-1万粉丝）',
                    'B': '成长期（1-10万粉丝）',
                    'C': '成熟期（10万+粉丝）'
                }
            },
            {
                id: 'goal',
                question: '现阶段你做内容的首要目标是什么？',
                hint: '请选择一个最符合的选项：\n\nA. 涨粉流量：扩大影响力，让更多人知道你\nB. 建立信任：让粉丝认可你的专业能力\nC. 直接转化：推广产品/服务，带来直接销售',
                placeholder: '输入 A、B 或 C',
                isChoice: true,
                choices: {
                    'A': '涨粉流量',
                    'B': '建立信任',
                    'C': '直接转化'
                }
            },
            {
                id: 'platform',
                question: '你主要在哪个平台做内容？',
                hint: '不同平台的用户偏好和内容风格不同。\n\nA. 小红书：偏图文，重干货和生活方式\nB. 抖音：偏视频，重节奏和情绪\nC. 公众号：偏深度，重专业和思考\nD. B站：偏中长视频，重知识和趣味',
                placeholder: '输入 A、B、C 或 D',
                isChoice: true,
                choices: {
                    'A': '小红书',
                    'B': '抖音',
                    'C': '公众号',

            const q = fullDiagnosisQuestions[fullDiagnosisStep];
            const chat = document.getElementById('fullDiagnosisChat');

            chat.innerHTML += `

                    <div class="question-title"><span class="question-number">${fullDiagnosisStep + 1}</span>${q.question}</div>

            `;

            document.getElementById('fullDiagnosisInput').value = '';
            document.getElementById('fullDiagnosisInput').placeholder = q.placeholder;
            document.getElementById('fullDiagnosisInput').focus();

            chat.scrollTop = chat.scrollHeight;
        }

        function submitFullDiagnosisAnswer() {
            const input = document.getElementById('fullDiagnosisInput').value.trim();
            if (!input) {
                alert('请输入你的回答');
                return;
            }

            const q = fullDiagnosisQuestions[fullDiagnosisStep];
            let answer = input;

            if (q.isChoice) {
                const choice = input.toUpperCase().trim();
                if (!q.choices[choice]) {
                    alert('请输入正确的选项');
                    return;
                }
                answer = q.choices[choice];
            }

            fullDiagnosisAnswers[q.id] = answer;

            const chat = document.getElementById('fullDiagnosisChat');
            chat.innerHTML += `
                <div class="chat-message user">
                    <strong>你的回答：</strong><br>${answer}
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;

            fullDiagnosisStep++;

请按照以下流程生成选题：

## 第一步：象限匹配
基于素材分析和用户定位，判断适合哪些象限：
- Q1（泛人群+泛选题）：流量型，破圈潜力大
- Q2（泛人群+垂直选题）：专业破圈，建立权威
- Q3（垂直人群+泛选题）：情感共鸣，精准连接
- Q4（垂直人群+垂直选题）：精准转化，直接变现

## 第二步：应用6大理论
1. **选题四象限**：根据用户阶段推荐主攻象限
2. **爆款选题逻辑**：
   - 颠覆认知：反常识、反惯性、反预设、反刻板、反权威、反经验、反情绪

            try {
                const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ZHIPU_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'glm-4-flash',
                        messages: [{
                            role: 'user',
                            content: prompt
                        }]
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || '请求失败');
                }

                const data = await response.json();
                const result = data.choices[0].message.content;

                generatedTopicCount += 2;

                if (mode === 'first') {
                    document.getElementById('resultContent').innerHTML = formatResult(result);
                } else {
                    const currentContent = document.getElementById('resultContent').innerHTML;
                    const separator = '<hr style="margin: 25px 0; border: none; border-top: 2px dashed #667eea;">';
                    const header = '<h4 style="margin-top: 20px; color: #667eea;">📌 更多选题建议</h4>';
                    document.getElementById('resultContent').innerHTML = currentContent + separator + header + formatResult(result);
                }

                document.getElementById('result').classList.add('active');

                // 保存到历史
                appState.topics.push({
                    input: input,
                    result: result,
                    timestamp: new Date().toISOString()
                });
                saveState();

            } catch (error) {
                showError('生成失败：' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        function formatResult(text) {
            return text
                .replace(/### (.*)/g, '<h4>$1</h4>')
                .replace(/## (.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/---/g, '<hr style="margin: 15px 0; border: none; border-top: 1px solid #e0e0e0;">')
                .replace(/\n/g, '<br>')
                .replace(/- (.*)/g, '<li>$1</li>');
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').classList.add('active');
        }

        // ==================== 状态管理 ====================
        function saveState() {
            const stateToSave = {
                positioning: appState.positioning,
                method: appState.method,
                topics: appState.topics.slice(-20) // 只保留最近20条
            };
            localStorage.setItem('topic_config_v31', JSON.stringify(stateToSave));
        }

        function showHistory() {
            if (!appState.topics || appState.topics.length === 0) {
                alert('还没有生成过选题');
                return;
            }

            let history = '📋 历史选题记录\n\n';
            appState.topics.slice().reverse().forEach((item, index) => {
                const date = new Date(item.timestamp).toLocaleDateString();
                history += `${index + 1}. [${date}] ${item.input.substring(0, 30)}...\n`;
            });
            alert(history);
        }

        function resetPositioning() {
            if (confirm('确定要重新定位吗？当前定位将被清除。')) {
                localStorage.removeItem('topic_config_v31');
                appState.positioning = null;
                appState.method = null;
                location.reload();
            }
        }

        // ==================== 键盘事件 ====================
        document.getElementById('fullDiagnosisInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                submitFullDiagnosisAnswer();
            }
        });

        // ==================== 初始化 ====================
        window.onload = function() {
            const saved = localStorage.getItem('topic_config_v31');
            if (saved) {
                const config = JSON.parse(saved);
                if (config.positioning) {
                    appState.positioning = config.positioning;
                    appState.method = config.method;
                    appState.topics = config.topics || [];
                    showGeneratePage();
                }
            }
        };
    </script>
