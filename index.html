<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容选题助手 v3.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .version {
            font-size: 0.9em;
            opacity: 0.8;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            margin-top: 10px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #888;
            margin: 0 10px;
        }

        .step.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .step.completed {
            background: #4caf50;
            color: white;
        }

        .step-line {
            width: 40px;
            height: 2px;
            background: #e0e0e0;
            margin-top: 19px;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 14px;
            margin-right: 10px;
        }

        .question-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .question-hint {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-small {
            padding: 8px 20px;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .diagnosis-report {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .diagnosis-report h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .diagnosis-report h4 {
            color: #333;
            margin: 15px 0 10px;
            font-size: 16px;
        }

        .diagnosis-report p,
        .diagnosis-report li {
            font-size: 14px;
            line-height: 1.8;
            color: #555;
        }

        .diagnosis-report ul {
            padding-left: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 20px;
        }

        .result.active {
            display: block;
        }

        .result-content {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            line-height: 1.8;
        }

        .result-content h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-content h4 {
            color: #333;
            margin: 15px 0 10px;
        }

        .result-content strong {
            color: #764ba2;
        }

        .topic-input {
            font-size: 16px;
        }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .quick-prompt {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quick-prompt:hover {
            background: #e0e0e0;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .chat-container {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .chat-message {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .chat-message.bot {
            border-left: 4px solid #667eea;
        }

        .chat-message.user {
            border-left: 4px solid #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 内容选题助手</h1>
            <span class="version">v3.0</span>
            <p>基于"选题四象限"方法论，先定位诊断，再生成高质量选题</p>
        </div>

        <!-- 步骤指示器 -->
        <div class="step-indicator">
            <div class="step active" id="step1-indicator">1</div>
            <div class="step-line"></div>
            <div class="step" id="step2-indicator">2</div>
            <div class="step-line"></div>
            <div class="step" id="step3-indicator">3</div>
        </div>

        <!-- 页面1：欢迎页 -->
        <div class="card page active" id="welcomePage">
            <h2 style="margin-bottom: 20px;">👋 欢迎使用内容选题助手</h2>
            <p style="color: #666; line-height: 1.8; margin-bottom: 20px;">
                这是一个基于<strong>10年内容营销经验</strong>打造的智能选题工具。
                与其他AI工具不同，我们会先帮你进行<strong>定位诊断</strong>，
                确保目标人群清晰，然后再生成真正能带来结果的选题。
            </p>
            <h3 style="margin: 20px 0 10px; font-size: 16px;">使用流程：</h3>
            <ul style="line-height: 2; color: #666;">
                <li><strong>第一步：</strong>回答几个问题，让我们了解你的定位</li>
                <li><strong>第二步：</strong>获得定位诊断报告</li>
                <li><strong>第三步：</strong>输入灵感，生成高质量选题</li>
            </ul>
            <button class="btn" onclick="startDiagnosis()">开始定位诊断 →</button>
            <button class="btn btn-secondary" onclick="loadSavedConfig()" style="margin-left: 10px;">加载已保存的配置</button>
        </div>

        <!-- 页面2：定位诊断 -->
        <div class="card page" id="diagnosisPage">
            <h2 style="margin-bottom: 20px;">📋 定位诊断</h2>
            <div class="chat-container" id="diagnosisChat"></div>
            <div class="form-group">
                <textarea id="diagnosisInput" placeholder="输入你的回答..." style="min-height: 80px;"></textarea>
            </div>
            <button class="btn" onclick="submitDiagnosisAnswer()">提交</button>
            <button class="btn btn-secondary" onclick="showPage('welcomePage')" style="margin-left: 10px;">返回</button>
        </div>

        <!-- 页面3：诊断报告 -->
        <div class="card page" id="reportPage">
            <h2 style="margin-bottom: 20px;">📊 定位诊断报告</h2>
            <div id="diagnosisReport"></div>
            <div class="btn-group">
                <button class="btn" onclick="confirmDiagnosis()">确认，开始生成选题</button>
                <button class="btn btn-secondary" onclick="restartDiagnosis()">重新诊断</button>
            </div>
        </div>

        <!-- 页面4：选题生成 -->
        <div class="card page" id="generatePage">
            <h2 style="margin-bottom: 20px;">💡 选题生成器</h2>

            <div class="diagnosis-report">
                <h4>✅ 已确认的定位</h4>
                <div id="confirmedPosition"></div>
            </div>

            <div class="form-group">
                <label>输入你的灵感、想法、热点或任何内容素材...</label>
                <textarea id="topicInput" class="topic-input" placeholder="例如：&#10;- 今天看到35岁女性职场焦虑的热点&#10;- 很多学员问我，工作忙怎么坚持学英语&#10;- 想做一个关于"早起学习"的内容&#10;- 任何一句话、一个想法都可以..."></textarea>
                <div class="quick-prompts">
                    <button class="quick-prompt" onclick="setQuickPrompt('热点话题')">🔥 热点话题</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('学员常见问题')">❓ 学员问题</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('个人经历/故事')">📖 个人故事</button>
                    <button class="quick-prompt" onclick="setQuickPrompt('专业知识/干货')">📚 专业干货</button>
                </div>
            </div>

            <button class="btn" onclick="generateTopics()">生成选题</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在基于你的定位生成选题...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <h3>📌 选题建议</h3>
                <div class="result-content" id="resultContent"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary btn-small" onclick="showPage('welcomePage')">🏠 返回首页</button>
            </div>
        </div>
    </div>

    <script>
        // 内置API Key（智谱AI）
        const ZHIPU_API_KEY = '59e07b20a42f42818e4251635ea23419.RcQ0FD0Jngw9bD4X';

        // 全局状态
        let diagnosisState = {
            step: 0,
            answers: {},
            report: null,
            confirmed: false
        };

        // 诊断问题
        const diagnosisQuestions = [
            {
                id: 'audience',
                question: '你的目标人群是谁？',
                hint: '请详细描述：年龄、职业、身份标签、他们目前面临什么核心困扰？\n\n示例好回答：\n"35岁左右的职场女性，想在工作中提升英语，但平时工作忙、没时间学习，之前报过很多课都半途而废"',
                placeholder: '描述你的目标人群...'
            },
            {
                id: 'product',
                question: '你提供什么产品或服务？',
                hint: '它解决了用户的什么问题？有什么独特之处？\n\n示例好回答：\n"30天英语提分课程，针对在职人员设计，每天20分钟，帮助学员从英语小白到能看懂工作相关的英文资料"',
                placeholder: '描述你的产品/服务...'
            },
            {
                id: 'stage',
                question: '你的IP目前处于哪个阶段？',
                hint: '请选择一个最符合的选项：\n\nA. 起步期（0-1万粉丝）：目标是快速涨粉，扩大知名度\nB. 成长期（1-10万粉丝）：目标是建立信任，深度连接粉丝\nC. 成熟期（10万+粉丝）：目标是转化变现，商业闭环',
                placeholder: '输入 A、B 或 C',
                isChoice: true,
                choices: {
                    'A': '起步期（0-1万粉丝）',
                    'B': '成长期（1-10万粉丝）',
                    'C': '成熟期（10万+粉丝）'
                }
            },
            {
                id: 'goal',
                question: '现阶段你做内容的首要目标是什么？',
                hint: '请选择一个最符合的选项：\n\nA. 涨粉流量：扩大影响力，让更多人知道你\nB. 建立信任：让粉丝认可你的专业能力\nC. 直接转化：推广产品/服务，带来直接销售',
                placeholder: '输入 A、B 或 C',
                isChoice: true,
                choices: {
                    'A': '涨粉流量',
                    'B': '建立信任',
                    'C': '直接转化'
                }
            }
        ];

        // 页面切换
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 更新步骤指示器
        function updateStepIndicator(step) {
            for (let i = 1; i <= 3; i++) {
                const el = document.getElementById('step' + i + '-indicator');
                el.classList.remove('active', 'completed');
                if (i < step) el.classList.add('completed');
                else if (i === step) el.classList.add('active');
            }
        }

        // 开始诊断
        function startDiagnosis() {
            diagnosisState = {
                step: 0,
                answers: {},
                report: null,
                confirmed: false
            };
            showPage('diagnosisPage');
            updateStepIndicator(1);
            showNextQuestion();
        }

        // 显示下一个问题
        function showNextQuestion() {
            if (diagnosisState.step >= diagnosisQuestions.length) {
                // 所有问题回答完毕，生成诊断报告
                generateDiagnosisReport();
                return;
            }

            const q = diagnosisQuestions[diagnosisState.step];
            const chat = document.getElementById('diagnosisChat');

            // 添加问题到聊天
            chat.innerHTML += `
                <div class="chat-message bot">
                    <div class="question-title"><span class="question-number">${diagnosisState.step + 1}</span>${q.question}</div>
                    <div class="question-hint">${q.hint.replace(/\n/g, '<br>')}</div>
                </div>
            `;

            // 清空输入框
            document.getElementById('diagnosisInput').value = '';
            document.getElementById('diagnosisInput').placeholder = q.placeholder;
            document.getElementById('diagnosisInput').focus();

            // 滚动到底部
            chat.scrollTop = chat.scrollHeight;
        }

        // 提交诊断回答
        function submitDiagnosisAnswer() {
            const input = document.getElementById('diagnosisInput').value.trim();
            if (!input) {
                alert('请输入你的回答');
                return;
            }

            const q = diagnosisQuestions[diagnosisState.step];
            let answer = input;

            // 处理选择题
            if (q.isChoice) {
                const choice = input.toUpperCase().trim();
                if (!q.choices[choice]) {
                    alert('请输入 A、B 或 C');
                    return;
                }
                answer = q.choices[choice];
            }

            // 保存答案
            diagnosisState.answers[q.id] = answer;

            // 添加用户消息到聊天
            const chat = document.getElementById('diagnosisChat');
            chat.innerHTML += `
                <div class="chat-message user">
                    <strong>你的回答：</strong><br>${answer}
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;

            // 下一个问题
            diagnosisState.step++;
            setTimeout(showNextQuestion, 500);
        }

        // 生成诊断报告
        async function generateDiagnosisReport() {
            // 显示加载状态
            const chat = document.getElementById('diagnosisChat');
            chat.innerHTML += `
                <div class="chat-message bot">
                    <div class="loading active" style="padding: 10px;">
                        <div class="spinner" style="width: 30px; height: 30px; margin: 0 auto 10px;"></div>
                        <p style="font-size: 14px;">正在分析你的定位...</p>
                    </div>
                </div>
            `;

            // 调用AI生成诊断报告
            const prompt = `请基于以下信息，为用户生成定位诊断报告：

【用户回答】
- 目标人群：${diagnosisState.answers.audience}
- 核心产品/服务：${diagnosisState.answers.product}
- 当前阶段：${diagnosisState.answers.stage}
- 选题目标：${diagnosisState.answers.goal}

请生成一份定位诊断报告，包含：
1. 基本信息
2. 诊断分析（优势点、潜在问题、改进建议）
3. 如果定位有问题，给出MVP调整建议

输出格式用HTML，使用<h3>、<h4>、<p>、<ul>、<li>等标签。`;

            try {
                const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ZHIPU_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'glm-4-flash',
                        messages: [{
                            role: 'user',
                            content: prompt
                        }]
                    })
                });

                const data = await response.json();
                const report = data.choices[0].message.content;

                diagnosisState.report = {
                    answers: {...diagnosisState.answers},
                    analysis: report
                };

                // 显示报告页面
                document.getElementById('diagnosisReport').innerHTML = report;
                showPage('reportPage');
                updateStepIndicator(2);

            } catch (error) {
                alert('生成报告失败：' + error.message);
            }
        }

        // 确认诊断
        function confirmDiagnosis() {
            if (!diagnosisState.report) return;

            diagnosisState.confirmed = true;

            // 保存到本地
            localStorage.setItem('topic_config_v3', JSON.stringify(diagnosisState.report));

            // 显示确认后的页面
            document.getElementById('confirmedPosition').innerHTML = `
                <p><strong>目标人群：</strong>${diagnosisState.answers.audience}</p>
                <p><strong>产品/服务：</strong>${diagnosisState.answers.product}</p>
                <p><strong>当前阶段：</strong>${diagnosisState.answers.stage}</p>
                <p><strong>选题目标：</strong>${diagnosisState.answers.goal}</p>
            `;

            showPage('generatePage');
            updateStepIndicator(3);
        }

        // 重新诊断
        function restartDiagnosis() {
            startDiagnosis();
        }

        // 加载已保存的配置
        function loadSavedConfig() {
            const saved = localStorage.getItem('topic_config_v3');
            if (!saved) {
                alert('没有找到已保存的配置');
                return;
            }

            const config = JSON.parse(saved);
            diagnosisState.report = config;
            diagnosisState.answers = config.answers;
            diagnosisState.confirmed = true;

            document.getElementById('confirmedPosition').innerHTML = `
                <p><strong>目标人群：</strong>${config.answers.audience}</p>
                <p><strong>产品/服务：</strong>${config.answers.product}</p>
                <p><strong>当前阶段：</strong>${config.answers.stage}</p>
                <p><strong>选题目标：</strong>${config.answers.goal}</p>
            `;

            showPage('generatePage');
            updateStepIndicator(3);
        }

        // 设置快捷提示
        function setQuickPrompt(type) {
            const input = document.getElementById('topicInput');
            switch(type) {
                case '热点话题':
                    input.value = '最近看到关于[热点话题]的讨论，想结合这个做个内容...';
                    break;
                case '学员常见问题':
                    input.value = '很多学员问我：[具体问题]...';
                    break;
                case '个人经历/故事':
                    input.value = '想分享我的一个经历：[具体故事]...';
                    break;
                case '专业知识/干货':
                    input.value = '想讲一个专业知识点：[具体内容]...';
                    break;
            }
            input.focus();
        }

        // 生成选题
        async function generateTopics() {
            if (!diagnosisState.confirmed) {
                alert('请先完成定位诊断');
                return;
            }

            const input = document.getElementById('topicInput').value.trim();
            if (!input) {
                alert('请输入你的灵感、想法或素材');
                return;
            }

            // 显示加载状态
            document.getElementById('loading').classList.add('active');
            document.getElementById('result').classList.remove('active');
            document.getElementById('error').classList.remove('active');

            // 构建提示词
            const prompt = `你是一位资深的内容营销专家，拥有10年经验，擅长通过"选题四象限方法论"为知识型IP生成高质量选题。

【用户已确认的定位】
- 目标人群：${diagnosisState.answers.audience}
- 核心产品/服务：${diagnosisState.answers.product}
- 当前阶段：${diagnosisState.answers.stage}
- 选题目标：${diagnosisState.answers.goal}

【用户输入的素材】
${input}

请按照以下流程生成选题：

## 第一步：象限匹配
基于素材分析和用户定位，判断适合哪些象限：
- Q1（泛人群+泛选题）：流量型，破圈潜力大
- Q2（泛人群+垂直选题）：专业破圈，建立权威
- Q3（垂直人群+泛选题）：情感共鸣，精准连接
- Q4（垂直人群+垂直选题）：精准转化，直接变现

## 第二步：选题生成
为每个适合的象限生成1-2条高质量选题，必须满足以下自检标准：
- ✅ 是否贴近用户的目标人群
- ✅ 是否还原真实场景/痛点
- ✅ 是否能和核心产品/服务建立连接
- ✅ 是否符合爆款选题格式
- ✅ 逻辑是否自洽

## 输出格式
### 选题1：[标题]
**基本信息**
- **象限归属**：[Q1/Q2/Q3/Q4]
- **人群指向**：[具体人群]

**选题分析**
- **场景还原**：[真实场景描述]
- **痛点分析**：[为什么这个问题值得做]
- **情绪价值**：[能引发什么情绪]

**产品连接**
- **连接方式**：[如何自然地引入产品]
- **转化路径**：[如何导流到产品]

---

### 选题2：[标题]
[重复以上结构]

---

### 💡 延展思考
基于这个素材，你还可能尝试的方向`;

            try {
                const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ZHIPU_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'glm-4-flash',
                        messages: [{
                            role: 'user',
                            content: prompt
                        }]
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || '请求失败');
                }

                const data = await response.json();
                const result = data.choices[0].message.content;

                // 显示结果
                document.getElementById('resultContent').innerHTML = formatResult(result);
                document.getElementById('result').classList.add('active');

            } catch (error) {
                showError('生成失败：' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        // 格式化结果
        function formatResult(text) {
            return text
                .replace(/### (.*)/g, '<h4>$1</h4>')
                .replace(/## (.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/---/g, '<hr>')
                .replace(/\n/g, '<br>');
        }

        // 显示错误
        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').classList.add('active');
        }

        // 支持回车提交
        document.getElementById('diagnosisInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                submitDiagnosisAnswer();
            }
        });
    </script>
